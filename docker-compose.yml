services:
  web:
    build: 
      context: .
      dockerfile: Dockerfile
    ports:
      - "${WEB_PORT:-8080}:80"
    environment:
      DB_HOST: db
      DB_USER: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      DB_NAME: ${MYSQL_DATABASE:-xscj}
    volumes:
      - ./:/var/www/html
    depends_on:
      - db
    networks:
      - app-network

  db:
    image: mysql:5.5
    command: --character-set-server=utf8 --collation-server=utf8_general_ci
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-xscj}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./user.sql:/docker-entrypoint-initdb.d/user.sql
      - ./xs.sql:/docker-entrypoint-initdb.d/xs.sql
    ports:
      - "3306:3306"
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  mysql_data: